<!DOCTYPE html>
<html>
<head>
 <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0066ff">
<link rel="apple-touch-icon" href="icon.png">

<title>Intraday Trading Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f4f7;
  padding: 15px;
}
h2 { text-align:center; margin-bottom:15px; }

.card {
  background:#fff;
  padding:16px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
  max-width:520px;
  margin-left:auto;
  margin-right:auto;
}

label { font-size:13px; font-weight:600; color:#555; }
input, select {
  width:100%;
  padding:10px;
  margin-top:4px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:15px;
}

button {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#0066ff;
  color:white;
  font-size:16px;
  font-weight:600;
}

.divider { height:1px; background:#eee; margin:12px 0; }
.big-green { color:#0a8f3c; font-size:22px; font-weight:700; }
.big-red { color:#d93025; font-size:20px; font-weight:700; }
.muted { color:#666; font-size:14px; }
</style>
</head>

<body>

<h2>Intraday Trading Calculator</h2>

<div class="card">

  <label>Market Type</label>
  <select id="marketType">
    <option value="indian">Indian Market</option>
    <option value="crypto">Crypto (Delta – Limit Order)</option>
  </select>

  <label>Capital Used (₹)</label>
  <input id="capital" type="number">

  <label>Leverage (x)</label>
  <input id="leverage" type="number" value="5">

  <label>Trade Type</label>
  <select id="tradeType">
    <option value="BUY">BUY (Long)</option>
    <option value="SELL">SELL (Short)</option>
  </select>
</div>

<div class="card">
  <label>Entry Price</label>
  <input id="entry" type="number">

  <label>Stop Loss Type</label>
  <select id="slType">
    <option value="PRICE">SL Price</option>
    <option value="PERCENT">SL %</option>
  </select>

  <label>Stop Loss Value</label>
  <input id="slValue" type="number">

  <label>Exit Type</label>
  <select id="exitType">
    <option value="PERCENT">Exit %</option>
    <option value="PRICE">Exit Price</option>
  </select>

  <label>Exit Value</label>
  <input id="exitValue" type="number">

  <button onclick="calculate()">Calculate</button>
</div>

<div id="result" class="card" style="display:none;"></div>

<script>
function calculate() {

  var marketType = document.getElementById("marketType").value;
  var capital = Number(document.getElementById("capital").value);
  var leverage = Number(document.getElementById("leverage").value);
  var tradeType = document.getElementById("tradeType").value;

  var entry = Number(document.getElementById("entry").value);
  var slType = document.getElementById("slType").value;
  var slValue = Number(document.getElementById("slValue").value);

  var exitType = document.getElementById("exitType").value;
  var exitValue = Number(document.getElementById("exitValue").value);

  if (!capital || !leverage || !entry || !slValue || !exitValue) {
    alert("Please fill all fields");
    return;
  }

  var effectiveCapital = capital * leverage;

  var qty = Math.floor(effectiveCapital / entry);
  if (qty <= 0) { alert("Capital too low"); return; }

  var slPrice = (slType === "PERCENT")
    ? (tradeType === "BUY"
        ? entry * (1 - slValue/100)
        : entry * (1 + slValue/100))
    : slValue;

  var tpPrice = (exitType === "PERCENT")
    ? (tradeType === "BUY"
        ? entry * (1 + exitValue/100)
        : entry * (1 - exitValue/100))
    : exitValue;

  function indianCharges(buy, sell) {
    var t = buy + sell;
    var broker = Math.min(buy*0.0003,20) + Math.min(sell*0.0003,20);
    var stt = sell*0.00025;
    var exchange = t*0.0000325;
    var sebi = t*0.000001;
    var stamp = buy*0.00003;
    var gst = (broker + exchange + sebi)*0.18;
    return broker + stt + exchange + sebi + stamp + gst;
  }

  function cryptoCharges(entryVal, exitVal) {
    var fee = 0.02 / 100;
    return (entryVal + exitVal) * fee;
  }

  var chargesTP = (marketType === "crypto")
    ? cryptoCharges(entry*qty, tpPrice*qty)
    : indianCharges(entry*qty, tpPrice*qty);

  var profit = ((tradeType==="BUY"?tpPrice-entry:entry-tpPrice)*qty) - chargesTP;

  var chargesSL = (marketType === "crypto")
    ? cryptoCharges(entry*qty, slPrice*qty)
    : indianCharges(entry*qty, slPrice*qty);

  var loss = Math.abs(entry-slPrice)*qty + chargesSL;

  document.getElementById("result").style.display="block";
  document.getElementById("result").innerHTML = `
    <div class="muted">Final Quantity</div>
    <div class="big-green">${qty}</div>

    <div class="divider"></div>

    <div class="muted">Stop Loss Price</div>
    <div class="big-red">₹ ${slPrice.toFixed(2)}</div>

    <div class="divider"></div>

    <div class="muted">Target Price</div>
    <div class="big-green">₹ ${tpPrice.toFixed(2)}</div>

    <div class="divider"></div>

    <div class="muted">Profit After Charges</div>
    <div class="big-green">₹ ${profit.toFixed(2)}</div>

    <div class="divider"></div>

    <div class="muted">Loss If SL Hits</div>
    <div class="big-red">₹ ${loss.toFixed(2)}</div>
  `;
}
</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
